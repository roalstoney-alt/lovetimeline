<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Timeline</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{color:#fff;background:#000}
.hero{width:100%;height:100vh;position:relative}
video{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0}
.content{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
h1{font-size:32px;margin-bottom:12px;text-shadow:0 0 10px #000}
p{font-size:18px;margin-bottom:32px;text-shadow:0 0 10px #000}
.btn{display:inline-block;padding:16px 36px;background:#e13c6a;color:#fff;border-radius:12px;text-decoration:none;font-weight:600}
</style>
</head>
<body>
<div class="hero">
<video autoplay muted loop playsinline></video>
<div class="content">
<h1>This Is Your Future</h1>
<p>See Your Love Story In Seconds</p>
<a href="upload.html" class="btn">Create My Story</a>
</div>
</div>
</body>
</html>
