<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Timeline - Create Your Story</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{color:#fff;background:#0b0b0e}
.hero{width:100%;height:100vh;position:relative;display:flex;align-items:center;justify-content:center;text-align:center}
.hero video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero .content{position:relative;z-index:1;padding:0 20px}
.hero h1{font-size:clamp(28px,6vw,52px);margin-bottom:16px;text-shadow:0 0 15px #000}
.hero p{font-size:clamp(16px,3vw,22px);margin-bottom:40px;text-shadow:0 0 10px #000}
.btn{display:inline-block;padding:18px 44px;background:#e24070;color:#fff;border-radius:14px;text-decoration:none;font-weight:bold;font-size:18px}

.demo{padding:60px 20px;text-align:center}
.demo video{max-width:400px;width:100%;border-radius:24px}

.tagline{padding:30px 20px;text-align:center;font-size:20px;color:#ddd}

.products{padding:60px 20px;max-width:500px;margin:0 auto}
.card{background:#141419;border-radius:18px;padding:28px;margin-bottom:18px}
.card h3{font-size:22px;margin-bottom:8px}
.card .price{font-size:20px;color:#e24070;font-weight:bold;margin-bottom:20px}
.card a{display:block;background:#e24070;color:#fff;text-align:center;padding:16px;border-radius:14px;text-decoration:none;font-weight:bold}

.footer-cta{padding:80px 20px;text-align:center}
</style>
</head>
<body>

<!-- 主视频区 -->
<section class="hero">
<video autoplay muted loop playsinline></video>
<div class="content">
<h1>This Is Your Future</h1>
<p>See Your Love Story In Seconds</p>
<a href="upload.html" class="btn">Create My Story</a>
</div>
</section>

<!-- 演示视频 -->
<section class="demo">
<video autoplay muted loop playsinline></video>
</section>

<!-- 流程文案 -->
<section class="tagline">
Upload a photo → Generate your story → Unlock full video
</section>

<!-- 3个产品卡片（文档要求完整实现） -->
<section class="products">
<div class="card">
<h3>Preview</h3>
<div class="price">Free</div>
<a href="upload.html">Start Free</a>
</div>
<div class="card">
<h3>Full Story</h3>
<div class="price">$9.9</div>
<a href="https://lovetimeline.myshopify.com/products/full-story">Unlock Now</a>
</div>
<div class="card">
<h3>Premium</h3>
<div class="price">$19.9</div>
<a href="https://lovetimeline.myshopify.com/products/premium">Get Premium</a>
</div>
</section>

<!-- 底部CTA -->
<section class="footer-cta">
<a href="upload.html" class="btn">Start My Love Story</a>
</section>

</body>
</html>
