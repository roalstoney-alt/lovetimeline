<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoveTimeline</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    /* HERO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    /* 视频背景 */
    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    /* 内容层 */
    .overlay {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
    }

    .btn {
      margin-top: 20px;
      padding: 14px 28px;
      background: #ff6b6b;
      border-radius: 30px;
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    .section {
      padding: 30px 20px;
    }
  </style>
</head>

<body>

  <!-- HERO（视频第一屏） -->
  <div class="hero">

    <video 
      id="previewVideo" 
      class="bg-video"
      autoplay 
      muted 
      loop 
      playsinline 
      preload="auto"
      poster="cover.jpg"
    >
      <source src="https://pub-88394393d2aa4860b9b354529cb43c47.r2.dev/output.mp4" type="video/mp4">
    </video>

    <div class="overlay">
      <h1>This is your future</h1>
      <p>See your love story in seconds</p>

      <a href="#next" class="btn">Create My Story (Free)</a>

      <p style="margin-top:20px;font-size:14px;">
        Takes less than 10 seconds
      </p>

      <!-- 🔥 增强代入感 -->
      <p style="margin-top:10px;color:#fff;">
        What if this was your life?
      </p>
    </div>

  </div>

  <!-- TEXT -->
  <div id="next" class="section">
    <h3>Upload a photo → Get your life story</h3>
    <p>People say this made them cry</p>
  </div>

  <!-- CTA -->
  <div class="section">
    <a href="#" class="btn">Create My Story</a>
  </div>

  <!-- JS（移动端自动播放修复） -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const video = document.getElementById("previewVideo");

      const tryPlay = () => {
        const playPromise = video.play();
        if (playPromise !== undefined) {
          playPromise.catch(() => {
            document.body.addEventListener("click", () => {
              video.play();
            }, { once: true });
          });
        }
      };

      tryPlay();
    });
  </script>

</body>
</html>
