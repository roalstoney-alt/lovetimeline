<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoveTimeline</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      text-align: center;
    }

    /* HERO VIDEO */
    .hero {
      position: relative;
      height: 100vh;
      overflow: hidden;
    }

    .bg-video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 1;
    }

    .overlay {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 10px;
    }

    p {
      color: #aaa;
    }

    .btn {
      margin-top: 20px;
      padding: 14px 28px;
      background: #ff6b6b;
      border-radius: 30px;
      color: white;
      text-decoration: none;
      font-size: 16px;
    }

    .section {
      padding: 30px 20px;
    }

    .popup {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: rgba(0,0,0,0.95);
      padding: 20px;
      display: none;
    }

    .popup h2 {
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <!-- HERO（视频已上移🔥） -->
  <div class="hero">

    <!-- ✅ 已加 loop -->
    <video id="previewVideo" class="bg-video" autoplay muted loop playsinline>
      <source src="https://pub-88394393d2aa4860b9b354529cb43c47.r2.dev/output.mp4" type="video/mp4">
    </video>

    <div class="overlay">
      <h1>This is your future</h1>
      <p>See your love story in seconds</p>

      <a href="#next" class="btn">Create My Story (Free)</a>

      <p style="margin-top:20px;font-size:14px;">
        Takes less than 10 seconds
      </p>
    </div>

  </div>

  <!-- TEXT -->
  <div id="next" class="section">
    <h3>Upload a photo → Get your life story</h3>
    <p>People say this made them cry</p>
  </div>

  <!-- CTA -->
  <div class="section">
    <a href="#" class="btn">Create My Story</a>
  </div>

  <!-- POPUP -->
  <div class="popup" id="popup">
    <h2>Your story is ready…</h2>
    <p>You’ve only seen the beginning</p>

    <a href="https://buy.stripe.com/your-link" class="btn">
      Unlock My Story
    </a>

    <p style="font-size:12px;color:#666;margin-top:10px;">
      Only $9.9
    </p>
  </div>

  <script>
    setTimeout(() => {
      const video = document.getElementById("previewVideo");
      const popup = document.getElementById("popup");

      video.style.filter = "blur(10px)";
      video.pause();

      popup.style.display = "block";
    }, 6000);
  </script>

</body>
</html>
