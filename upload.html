<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Your Photo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0b0b0e;color:#fff;padding:20px}
.container{max-width:480px;margin:60px auto;background:#141419;padding:34px;border-radius:20px}
h1{text-align:center;margin-bottom:34px}
.item{margin-bottom:24px}
label{display:block;margin-bottom:10px;font-weight:bold}
input,select{width:100%;padding:16px;background:#1c1c24;border:none;border-radius:12px;color:#fff;font-size:16px}
.btn{display:block;width:100%;padding:18px;background:#e24070;color:#fff;border-radius:14px;text-align:center;text-decoration:none;font-weight:bold;font-size:18px;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>Create Your Love Timeline</h1>
<div class="item">
<label>Upload Your Photo</label>
<input type="file" accept="image/*">
</div>
<div class="item">
<label>Video Style</label>
<select>
<option>Romantic</option>
<option>Cinematic</option>
<option>Dreamy</option>
</select>
</div>
<a href="preview.html" class="btn">Generate My Story</a>
</div>
</body>
</html>
