<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Your Photo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
body{background:#f9f9f9;padding:20px}
.container{max-width:480px;margin:60px auto;background:#fff;padding:30px;border-radius:16px}
h1{text-align:center;margin-bottom:30px}
.item{margin-bottom:20px}
label{display:block;margin-bottom:8px;font-weight:600}
input,select{width:100%;padding:14px;border:1px solid #ddd;border-radius:10px}
.btn{display:block;width:100%;padding:16px;background:#e13c6a;color:#fff;border-radius:10px;text-align:center;text-decoration:none;font-weight:600;margin-top:10px}
</style>
</head>
<body>
<div class="container">
<h1>Create Your Love Timeline</h1>
<div class="item">
<label>Upload Your Photo</label>
<input type="file" accept="image/*">
</div>
<div class="item">
<label>Video Style</label>
<select>
<option>Romantic</option>
<option>Cinematic</option>
<option>Dreamy</option>
</select>
</div>
<a href="preview.html" class="btn">Generate My Story</a>
</div>
</body>
</html>
